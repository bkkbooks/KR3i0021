body:
  text: 品茶要錄宋黄儒撰總論説者常怪陸羽茶經不第建安之品葢前此茶事未甚興靈芽眞笋往往委翳消腐而人不知惜自國初以来士大夫沐浴膏澤詠歌昇平之日乆矣夫體勢灑落神觀冲淡惟兹茗飲爲可喜園林亦相與摘英夸異制捲鬻新而趨時之好故殊絶之品始得自出於蓁莽之間而其名遂冠天下借使陸羽復起閲其金餅味其雲腴當爽然自失矣因念草木之材一有負瓌偉絶特者未嘗不遇時而後興況於人乎然士大夫間爲珍藏精試之具非㑹雅好眞未嘗輒出其好事者又嘗論其采制之出入器用之宜否較試之湯火圗於縑素傳翫於時獨未有補於賞鑒之眀爾葢園民射利膏油其面色品味易辨而難評予因收閲之暇爲原采造之得失較試之低昻次爲十説以中其病題曰品茶要錄云一采造過時茶事起於驚蟄前其采芽如鷹爪初造曰試焙又曰一火次曰二火二火之茶已次一火矣故市茶芽者惟同出於三火前者爲最佳尤喜薄寒氣候隂不至於凍芽茶尤畏霜有造於一火二火皆遇霜而三火霜霽則三火之茶勝矣晴不至於暄則榖芽含養約勒而滋長有漸采工亦優爲矣凡試時泛色鮮白隱於薄霧者得於佳時而然也有造於積雨者其色昏黄或氣候暴暄茶芽蒸發采工汗手熏漬揀摘不給則製造雖多皆爲常品矣試時色非鮮白水脚微紅者過時之病也二白合盜葉茶之精絶者曰鬭曰亞鬭其次揀芽茶芽鬭品雖最上園户或止一株葢天材間有特異非能皆然也且物之變勢無窮而人之耳目有盡故造鬭品之家有昔優而今劣前負而後勝者雖工有至有不至亦造化推移不可得而擅也其造一火曰鬬二火曰亞鬭不過十數銙而已揀芽則不然徧園隴中擇其精英者爾其或貪多務得又滋色澤往往以白合盜葉間之試時色雖鮮白其味澀淡者間白合盜葉之病也一鷹爪之芽有兩小葉抱而生者白合也新條葉之抱生而色白者盜葉也造揀芽常剔取鷹爪而白合不用況盜葉乎三入雜物固不可以容偽況飲食之物尤不可也故茶有入他葉者建人號爲入雜銙列入柿葉常品入桴檻葉二葉易致又滋色澤園民欺售直而爲之試時無粟紋甘香盞面浮散隱如微毛或星星如纖絮者入雜之病也善茶品者側盞視之所入之多寡從可知矣嚮上下品有之近雖銙列亦或勾使四蒸不熟榖芽初采不過盈箱而已趣時爭新之埶然也旣采而蒸旣蒸而研蒸有不熟之病有過熟之病蒸不熟則雖精芽所損已多試時色青易沉味爲挑入之氣者不蒸熟之病也唯正熟者味甘香五過熟茶芽方蒸以氣爲候視之不可以不謹也試時色黄而粟紋大者過熟之病也然雖過熟愈於不熟甘香之味勝也故君謨論色則以青白勝黄白余論味則以黄白勝青白六焦釜茶蒸不可以逾久乆而過熟又乆則湯乾而焦釡之氣上茶工有乏新湯以益之是致熏損茶黄試時色多昏紅氣焦味惡者焦釡之病也建人號爲熱鍋氣七壓黄茶已蒸者爲黄黄細則已入捲模制之矣葢清潔鮮明則香色如之故采佳品者常於半曉間衝蒙雲霧或以罐汲新泉懸胸間得必投其中葢欲鮮也其或日氣烘爍茶芽暴長工力不給其芽已陳而不及蒸蒸而不及研研或出宿而後製試時色不鮮明薄如壞卵氣者壓黄也八清膏茶餅光黄又如䕃潤者搾不乾也搾欲盡去其膏膏盡則有如乾竹葉之色惟飾首面者故搾不欲乾以利易售試時色雖鮮白其味帶苦者漬膏之病也九傷焙夫茶本以芽葉之物就之捲模既出卷上笪焙之用火務令通徹卽以灰覆之虛其中以熱火氣然茶民不喜用實炭號爲冷火以茶餅新温欲速乾以見售故用火常帶烟焰烟焰旣多稍失看候以故熏損茶餅試時其色昏紅氣味帶焦者傷焰之病也十辯壑源沙溪壑源沙溪其地相背而中隔一嶺其勢無數里之遠然茶産頓殊有能出火移栽植之亦爲土氣所化竊嘗怪茶之爲草一物爾其勢必由得地而後異豈水絡地脉偏鍾粹於壑源抑御焙占此大岡巍隴神物伏䕶得其餘䕃耶何其甘芳精至而獨擅天下也觀夫春雷一驚筠籠纔起售者已擔簦挈槖於其門或先期而散留金錢或茶纔入笪而爭酬所直故壑源之茶常不足客所求其有桀滑之園民隂取沙溪茶黄雜就家捲而製之人徒趣其名睨其規模之相若不能原其實者葢有之矣凡壑源之茶售以十則沙溪之茶售以五其直大率放此然沙溪之園民亦勇於爲利或雜以松黄飾其首面凡肉理怯薄體輕而色黄試時雖鮮白不能乆泛香薄而味短者沙溪之品也凡肉理實厚體堅而色紫試時泛盞凝乆香滑而味長者壑源之品也後論余嘗論茶之精絶者白合未開其細如麥葢得青陽之輕清者也又其山多帶砂石而號嘉品者皆在山南葢得朝陽之和者也余嘗事閒乘晷景之明净適軒亭之瀟灑一取佳品嘗試旣而求水生於華池愈甘而清其有助乎然建安之茶散天下者不爲少而得建安之精品不爲多葢有得之者不能辯能辯矣或不善於烹試善烹試矣或非其時猶不善也況非其賓乎然未有主賢而賓愚者也夫惟知此然後盡茶之事昔者陸羽號爲知茶然羽之所知者皆今所謂草茶何哉如鴻漸所論蒸笋并葉畏流其膏葢草茶味短而淡故常恐去膏建茶力厚而甘故惟欲去膏又論福建爲未詳往往得之其味極佳由是觀之鴻漸未嘗到建安歟品茶要錄
