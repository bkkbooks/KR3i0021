front:
  text: 書黃道輔品茶要録後
  hash: sha256:73e0b322cf65e994299781529d56ba473761f375a881bcccfbb53800400d96b4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3i0021_WYG_002-1a}
body:
  text: 眉山蘇軾書物有畛而理無方窮天下之辨不足以盡一物之理逹者寓物以發其辨則一物之變可以盡南山之竹學者觀物之極而遊於物之表則何求而不得故輪扁行年七十而老於斫輪庖丁自技而進乎道由此其選也黃君道輔諱儒建安人博學能文淡然精深有道之士也作品茶要録十篇委曲微妙皆陸鴻漸以來論茶者所未及非至靜無求虛中不留烏能察物之情如此其詳哉昔張機有精理而韻不能髙故卒為名醫今道輔無所發其辨而寓之於茶為世外淡泊之好此以髙韻輔精理者豫悲其不幸早亡獨此書傳於世故發其篇末云
  hash: sha256:2aa2abd401ed8b999d75b44daa58730756ba01a6a5c88ada1b9be4df248b8d78
